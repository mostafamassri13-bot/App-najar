workflows:
  android-workflow:
    name: Android Build Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Unzip and Locate Project Files
        script: |
          unzip مساعد-النجار-الذكي.zip
          # البحث التلقائي عن المجلد الذي يحتوي على ملف تشغيل أندرويد ونقل محتوياته للرئيسي
          TARGET_DIR=$(find . -name "gradlew" | head -n 1 | xargs dirname)
          if [ -n "$TARGET_DIR" ] && [ "$TARGET_DIR" != "." ]; then
            echo "تم العثور على المشروع في المسار: $TARGET_DIR، جاري نقل الملفات..."
            cp -R $TARGET_DIR/* .
          fi
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Build Android APK
        script: |
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/**/*.apk
